        <div class="container2">
            <div class="kontakt">
                <h2>Skontaktuj się ze mną</h2>
                <form>
                    <div>
                        <label for="imie">Imię i nazwisko:</label><br>
                        <input type="text" id="imie" name="imie" required minlength="2">
                    </div>
                    <div>
                        <label for="email">Adres e-mail:</label><br>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div>
                        <label for="telefon">Numer telefonu (opcjonalnie):</label><br>
                        <input type="tel" id="telefon" name="telefon" pattern="[0-9+\s]{6,15}">
                    </div>
                    <div>
                        <label for="temat">Temat wiadomości:</label><br>
                        <input type="text" id="temat" name="temat" required>
                    </div>
                    <div>
                        <label for="wiadomosc">Wiadomość:</label><br>
                        <textarea id="wiadomosc" name="wiadomosc" rows="5" required minlength="10"></textarea>
                    </div>
                    <div>
                        <label>
                            <input type="checkbox" name="zgoda" required>
                            Wyrażam zgodę na przetwarzanie moich danych osobowych w celu kontaktu.
                        </label>
                    </div>
                    <div>
                        <button type="submit">Wyślij wiadomość</button>
                        <button type="reset">Wyczyść</button>
                    </div>
                </form>
            </div>
            <div class="img" style="width: 700px; height: 400px;">
                <img src="OBRAZY/max-verstappen-f1-2025-hiszpania-barcelona.avif" alt="zdjęcie">
